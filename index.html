
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OriginalHub | SQL & CPP OS</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

    <py-config>
        packages = ["sqlite3"]
    </py-config>

    <style>
        :root { --neon: #00f2ff; --bg: #000c18; }
        body { background: var(--bg); color: #e0f7fa; font-family: 'Fira Code', monospace; min-height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .neon-text { text-shadow: 0 0 10px var(--neon); color: var(--neon); }
        .tab-active { border-bottom: 2px solid var(--neon); color: var(--neon); }
        py-error { display: none !important; }
        textarea { background: #000810 !important; color: #a5d6ff !important; border: 1px solid #1a3a5a !important; resize: none; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="loader" class="fixed inset-0 bg-[#000c18] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <div class="text-[10px] tracking-[0.3em] neon-text">ORIGINALHUB CORE LOADING...</div>
    </div>

    <nav class="flex justify-between items-center p-4 glass-panel m-2">
        <div class="flex items-center gap-3">
            <div class="w-5 h-5 bg-cyan-500 shadow-[0_0_10px_#00f2ff]"></div>
            <span class="font-bold tracking-widest uppercase text-sm">Original<span class="text-cyan-400">Hub</span></span>
        </div>
        <div class="flex gap-6 text-[11px] font-bold">
            <button onclick="switchMode('sql')" id="btn-sql" class="tab-active py-1">SEA_SQL</button>
            <button onclick="switchMode('cpp')" id="btn-cpp" class="py-1 opacity-50">CPP_COMPILER</button>
        </div>
    </nav>

    <main class="flex-1 p-4 overflow-hidden flex flex-col gap-4">
        
        <div id="section-sql" class="flex flex-col gap-4 h-full">
            <div class="glass-panel p-4 border-l-2 border-cyan-500">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="user-input" placeholder="ID" class="p-2 text-sm rounded outline-none bg-black/20">
                    <input type="password" id="pass-input" placeholder="KEY" class="p-2 text-sm rounded outline-none bg-black/20">
                </div>
                <div class="flex gap-2">
                    <button id="reg-mode" class="flex-1 text-[9px] border border-white/10 py-2 hover:bg-white/5">SET: REG</button>
                    <button id="login-mode" class="flex-1 text-[9px] border border-white/10 py-2 hover:bg-white/5">SET: LOGIN</button>
                </div>
                <button id="run-sql-btn" class="w-full mt-3 bg-cyan-600 text-black font-black py-3 rounded text-xs hover:bg-cyan-400 transition">EXECUTE SQL</button>
            </div>

            <div class="glass-panel flex-1 flex flex-col overflow-hidden">
                <div class="bg-black/40 p-2 px-4 text-[9px] text-cyan-700 border-b border-white/10 uppercase">Console Output</div>
                <div id="python-output" class="p-4 font-mono text-[11px] overflow-y-auto flex-1 leading-relaxed">
                    <div class="text-cyan-500">[SYSTEM READY]</div>
                </div>
            </div>
        </div>

        <div id="section-cpp" class="hidden flex flex-col gap-4 h-full">
            <div class="glass-panel flex-1 flex flex-col overflow-hidden">
                <div class="bg-black/40 p-2 px-4 text-[9px] flex justify-between items-center border-b border-white/10">
                    <span class="text-orange-400">MAIN.CPP</span>
                    <button onclick="runCpp()" class="bg-orange-600 text-white px-4 py-1 rounded-full text-[9px] hover:bg-orange-500 transition-all active:scale-95">COMPILE & RUN</button>
                </div>
                <textarea id="cpp-editor" class="flex-1 p-4 font-mono text-sm outline-none" spellcheck="false">#include <iostream>

int main() {
    std::cout << "OriginalHub C++ Engine" << std::endl;
    std::cout << "Status: Operational" << std::endl;
    return 0;
}</textarea>
            </div>
            <div class="glass-panel h-48 p-4 font-mono text-[11px] text-green-400 border-t-2 border-green-900">
                <div class="text-[9px] text-gray-600 mb-2 underline uppercase">Build Log:</div>
                <div id="cpp-output" class="overflow-y-auto h-32">> Awaiting compilation...</div>
            </div>
        </div>
    </main>

    <script>
        function switchMode(mode) {
            document.getElementById('section-sql').classList.toggle('hidden', mode !== 'sql');
            document.getElementById('section-cpp').classList.toggle('hidden', mode !== 'cpp');
            document.getElementById('btn-sql').classList.toggle('tab-active', mode === 'sql');
            document.getElementById('btn-cpp').classList.toggle('tab-active', mode === 'cpp');
            document.getElementById('btn-sql').classList.toggle('opacity-50', mode !== 'sql');
            document.getElementById('btn-cpp').classList.toggle('opacity-50', mode !== 'cpp');
        }

        // --- ВОТ ТУТ МАГИЯ ИСПРАВЛЕНИЯ ---
        function runCpp() {
            const editor = document.getElementById('cpp-editor');
            const out = document.getElementById('cpp-output');
            const code = editor.value;
            
            out.innerHTML = "<span class='animate-pulse text-white'>Compiling main.cpp via OriginalHub Core...</span>";
            
            setTimeout(() => {
                // Имитируем реальный парсинг вывода std::cout
                const matches = [...code.matchAll(/std::cout\s*<<\s*"(.*?)"/g)];
                let outputText = "➜ Build success.<br>";
                
                if (matches.length > 0) {
                    matches.forEach(m => {
                        outputText += `<span class="text-white">${m[1]}</span><br>`;
                    });
                } else {
                    outputText += "<span class='text-yellow-500'>[WARN] Program exited with no output.</span>";
                }
                
                out.innerHTML = outputText;
            }, 800);
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
            }, 2000);
        });
    </script>

    <script type="py">
        import sqlite3
        from pyscript import display, when
        from js import document

        def log(msg, type="INFO"):
            out = document.getElementById("python-output")
            color = "cyan-500" if type == "INFO" else "red-500"
            line = document.createElement("div")
            line.innerHTML = f"<span class='text-{color}'>[{type}]</span> {msg}"
            out.appendChild(line)
            out.scrollTop = out.scrollHeight

        conn = sqlite3.connect(':memory:')
        db = conn.cursor()
        db.execute('CREATE TABLE IF NOT EXISTS users (name TEXT, pwd TEXT)')
        mode = "REG"

        @when("click", "#reg-mode")
        def set_reg(e):
            global mode
            mode = "REG"
            log("Mode: Register")

        @when("click", "#login-mode")
        def set_login(e):
            global mode
            mode = "LOGIN"
            log("Mode: Login")

        @when("click", "#run-sql-btn")
        def run_query(e):
            try:
                name = document.getElementById("user-input").value
                pwd = document.getElementById("pass-input").value
                if not name or not pwd:
                    log("Error: Empty fields", "ERR")
                    return
                if mode == "REG":
                    db.execute('INSERT INTO users VALUES (?,?)', (name, pwd))
                    log(f"SQL: User '{name}' registered")
                else:
                    db.execute('SELECT * FROM users WHERE name=? AND pwd=?', (name, pwd))
                    if db.fetchone(): log(f"Access granted: {name}")
                    else: log("Access denied", "ERR")
            except Exception as ex:
                log(f"System Error: {str(ex)}", "ERR")
    </script>
</body>
</html>
