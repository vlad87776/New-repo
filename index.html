<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт на GitHub Pages</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .hero {
            background: linear-gradient(rgba(0, 41, 82, 0.4), rgba(0, 41, 82, 0.4)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .nav-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        .btn {
            padding: 10px 25px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login {
            background-color: transparent;
            border: 2px solid #ffffff;
            color: white;
        }

        .btn-register {
            background-color: #0077b6;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        /* Стиль для вывода из Python */
        #python-output {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            border-left: 4px solid #0077b6;
        }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <a href="#" class="btn btn-login">Логин</a>
        <a href="#" class="btn btn-register">Регистрация</a>
    </div>

    <section class="hero">
        <h1>Добро пожаловать на море!</h1>
        
        <div id="python-output">
            Загрузка Python...
        </div>
    </section>

    <script type="py">
        from datetime import datetime
        import sys

        # Получаем текущее время
        now = datetime.now()
        current_time = now.strftime("%H:%M:%S")
        
        # Находим блок на странице и меняем текст
        from pyscript import display
        display(f"Привет из Python! Сейчас: {current_time}", target="python-output", append=False)
        
        print("Код выполнен успешно!")
    </script>

</body>
</html>
